<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เค้ามีอะไรจะบอกเธอ... 🥺</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .gif-container img {
            width: 160px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: absolute;
            right: 40px;
        }

        /* เอฟเฟกต์หัวใจลอย */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 24px;
            animation: floatUp 3s linear infinite;
            opacity: 0;
            bottom: -20px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="gif-container">
            <!-- รูปหมีร้องไห้สำนึกผิด -->
            <img id="mainGif" src="https://giphy.com" alt="Cute Sad GIF">
        </div>
        <!-- ข้อความขอคืนดี -->
        <h1 id="questionText">รักเธอนะคะ... ❤️<br>เราขอโทษนะ มาคืนดีกันนะคุณแฟน 🥺👉👈</h1>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">คืนดีกันนะ 💕</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">ไม่หายโกรธ หรอก 😜</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const mainGif = document.getElementById('mainGif');

        // ปุ่มไม่คืนดีจะวิ่งหนี แฟนจะกดไม่ได้
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // เมื่อกดปุ่มคืนดี
        function selectYes() {
            // ข้อความซึ้งๆ หลังจากคืนดีกัน
            questionText.innerHTML = "กอดๆ กันน้าาา 🥰<br>ขอบคุณที่ยกโทษให้เค้านะ รักที่สุดเลย! ❤️";
            // เปลี่ยนเป็นรูปหมีดีใจกระโดดกอด
            mainGif.src = "https://giphy.com"; 
            
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';

            // รันหัวใจลอยเต็มจอ
            setInterval(createHeart, 100);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const heartIcons = ['❤️', '💖', '💝', '🫶', '💕'];
            heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 1.5 + 's'; 
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 3500);
        }
    </script>
</body>
</html>
