<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise! 💖</title>
    <style>
        /* สไตล์หน้าเว็บตามต้นฉบับ TikTok */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* กรอบแสดงสไลด์โชว์รูปคู่ของคุณ */
        .image-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* จัดภาพคู่ให้สวยงามพอดีกรอบอัตโนมัติ */
            transition: opacity 0.3s ease-in-out;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: #adb5bd;
            color: white;
            position: absolute;
            right: 50px;
        }

        /* เอฟเฟกต์หัวใจลอย */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: floatUp 3s linear infinite;
            opacity: 0;
            bottom: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <div class="image-container">
            <!-- แสดงสไลด์รูปคู่ของคุณวนไปมา -->
            <img id="mainGif" src="" alt="Our Memory">
        </div>
        <!-- ข้อความขอคืนดี -->
        <h1 id="questionText">รักเธอนะคะ... ❤️<br>เราขอโทษนะ มาคืนดีกันนะคุณแฟน 🥺👉👈</h1>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="selectYes()">คืนดีกันนะ 💕</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">ไม่หายโกรธ หรอก 😜</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const mainGif = document.getElementById('mainGif');

        // รวมลิงก์รูปตรง (Direct Link) ทั้ง 6 รูปของคุณ
        const myPhotos = [
            "https://ibb.co",
            "https://ibb.co",
            "https://ibb.co",
            "https://ibb.co",
            "https://ibb.co",
            "https://ibb.co"
        ];

        let currentImgIndex = 0;

        // ฟังก์ชันสลับเปลี่ยนรูปภาพคู่ทุกๆ 2.5 วินาที
        function startSlideshow() {
            mainGif.src = myPhotos[currentImgIndex];
            setInterval(() => {
                currentImgIndex = (currentImgIndex + 1) % myPhotos.length;
                mainGif.src = myPhotos[currentImgIndex];
            }, 2500); 
        }

        // เริ่มต้นการทำงานของสไลด์โชว์รูปคู่
        startSlideshow();

        // ฟังก์ชันสุ่มให้ปุ่มวิ่งหนีแบบต้นฉบับ
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // ฟังก์ชันเมื่อกดปุ่ม "คืนดีกันนะ"
        function selectYes() {
            questionText.innerHTML = "กอดๆ กันน้าาา 🥰<br>ขอบคุณที่ยกโทษให้เค้านะ รักที่สุดเลย! ❤️";
            
            noBtn.style.display = 'none';
            yesBtn.style.display = 'none';

            // เอฟเฟกต์หัวใจลอยเต็มหน้าจอ
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's'; 
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    </script>
</body>
</html>
