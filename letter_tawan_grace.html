<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Grace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#1a0a12;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;overflow-x:hidden;}
.petal{position:fixed;top:-20px;font-size:16px;animation:fall linear infinite;pointer-events:none;z-index:0;opacity:0.6;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:.7;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}
.scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.envelope-wrap{position:relative;width:320px;height:220px;cursor:pointer;filter:drop-shadow(0 12px 40px rgba(255,100,150,0.4));transition:transform 0.2s;}
.envelope-wrap:hover{transform:scale(1.03);}
.envelope-body{width:320px;height:220px;background:linear-gradient(160deg,#5c1a30,#3a0d1e);border-radius:8px;position:absolute;border:1.5px solid rgba(255,150,180,0.3);}
.env-left{position:absolute;width:0;height:0;border-top:110px solid transparent;border-bottom:110px solid transparent;border-left:160px solid #4a1525;top:0;left:0;}
.env-right{position:absolute;width:0;height:0;border-top:110px solid transparent;border-bottom:110px solid transparent;border-right:160px solid #4a1525;top:0;right:0;}
.env-bottom{position:absolute;width:0;height:0;border-left:160px solid transparent;border-right:160px solid transparent;border-bottom:120px solid #3d1020;bottom:0;left:0;}
.env-flap{position:absolute;top:0;left:0;width:0;height:0;border-left:160px solid transparent;border-right:160px solid transparent;border-top:120px solid #6b2040;transform-origin:top center;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);z-index:5;}
.open .env-flap{transform:rotateX(180deg);}
.heart-seal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;z-index:6;transition:opacity 0.3s;}
.open .heart-seal{opacity:0;}
.tap-hint{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);color:rgba(255,180,200,0.6);font-size:12px;font-weight:700;letter-spacing:1px;white-space:nowrap;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
.letter{width:300px;background:linear-gradient(170deg,#fff8f9,#ffe8ef);border-radius:4px;padding:32px 28px 28px;position:relative;transform:translateY(-10px) scaleY(0);transform-origin:top center;transition:transform 0.7s cubic-bezier(0.34,1.3,0.64,1) 0.3s;box-shadow:0 20px 60px rgba(0,0,0,0.5);z-index:2;overflow:hidden;}
.letter.visible{transform:translateY(0) scaleY(1);}
.letter-bg{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0.05;font-size:40px;line-height:1.8;pointer-events:none;overflow:hidden;color:#c0006a;letter-spacing:8px;}
.letter-header{font-family:'Dancing Script',cursive;font-size:26px;color:#b0004e;text-align:center;margin-bottom:22px;opacity:0;transform:translateY(8px);transition:all 0.5s ease 0.8s;}
.letter.visible .letter-header{opacity:1;transform:translateY(0);}
.sorry-line{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;opacity:0;transform:translateX(-12px);transition:all 0.5s ease;font-size:15.5px;color:#3d0a1e;font-weight:700;line-height:1.5;}
.sorry-line .icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.letter.visible .sorry-line:nth-of-type(1){opacity:1;transform:none;transition-delay:1.0s;}
.letter.visible .sorry-line:nth-of-type(2){opacity:1;transform:none;transition-delay:1.4s;}
.divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#e0558a,transparent);margin:18px auto;opacity:0;transition:opacity 0.5s ease 1.8s;}
.letter.visible .divider{opacity:1;}
.photos-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;opacity:0;transition:opacity 0.6s ease 2s;}
.letter.visible .photos-grid{opacity:1;}
.photos-grid img{width:100%;aspect-ratio:1;object-fit:cover;object-position:center top;border-radius:8px;border:2px solid rgba(180,0,80,0.2);}
.photos-grid img.tall{grid-column:span 2;aspect-ratio:16/9;object-position:center 20%;}
.letter-sign{font-family:'Dancing Script',cursive;font-size:20px;color:#b0004e;text-align:right;margin-top:16px;opacity:0;transition:opacity 0.5s ease 2.5s;}
.letter.visible .letter-sign{opacity:1;}
</style>
</head>

<script>
(function(){
  var emojis=['🌸','💕','🌹','💗','🌷'];
  for(var i=0;i<14;i++){
    var p=document.createElement('span');
    p.className='petal';
    p.textContent=emojis[i%emojis.length];
    p.style.left=(Math.random()*100)+'vw';
    p.style.animationDuration=(4+Math.random()*6)+'s';
    p.style.animationDelay=(Math.random()*6)+'s';
    p.style.fontSize=(13+Math.random()*12)+'px';
    document.body.appendChild(p);
  }

  var opened=false;
  document.getElementById('env').addEventListener('click', function(){
    if(opened) return;
    opened=true;
    this.classList.add('open');
    var letter=document.getElementById('letter');
    setTimeout(function(){ letter.classList.add('visible'); }, 400);
  });
})();
</script>
